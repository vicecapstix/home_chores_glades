<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FamilyFlow</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
<script>
  try { if (localStorage.getItem('fc_theme') === 'dark') document.documentElement.setAttribute('data-theme','dark'); } catch(e) {}
</script>
<script type="module" src="./main.js"></script>
</head>
<body>

<!-- READ-ONLY BANNER -->
<div id="readonly-banner" class="hidden">👁 View only</div>

<!-- PIN / MEMBER SCREEN -->
<div id="pin-screen">
  <div class="pin-card">
    <div class="pin-title">Family<span style="color:var(--accent)">Flow</span></div>
    <div class="pin-sub" id="pin-member-sub">Select your name to continue</div>
    <div id="pin-member-chips" style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:1.25rem;"></div>
    <!-- 4-digit PIN pad (shown when member has a PIN) -->
    <div id="pin-member-pin" class="hidden">
      <div id="pin-member-name" style="font-family:'DM Serif Display',serif;font-size:1.2rem;margin-bottom:0.5rem;"></div>
      <div class="pin-dots" id="pin-member-dots">
        <div class="pin-dot"></div><div class="pin-dot"></div>
        <div class="pin-dot"></div><div class="pin-dot"></div>
      </div>
      <div class="pin-pad">
        <button class="pin-key" onclick="window.memberPinKey('1')">1</button>
        <button class="pin-key" onclick="window.memberPinKey('2')">2</button>
        <button class="pin-key" onclick="window.memberPinKey('3')">3</button>
        <button class="pin-key" onclick="window.memberPinKey('4')">4</button>
        <button class="pin-key" onclick="window.memberPinKey('5')">5</button>
        <button class="pin-key" onclick="window.memberPinKey('6')">6</button>
        <button class="pin-key" onclick="window.memberPinKey('7')">7</button>
        <button class="pin-key" onclick="window.memberPinKey('8')">8</button>
        <button class="pin-key" onclick="window.memberPinKey('9')">9</button>
        <button class="pin-key" style="visibility:hidden" disabled></button>
        <button class="pin-key" onclick="window.memberPinKey('0')">0</button>
        <button class="pin-key del" onclick="window.memberPinDel()">&#9003;</button>
      </div>
      <div class="pin-error" id="pin-member-error"></div>
      <button class="btn-sm" style="margin-top:1rem;width:100%" onclick="window.memberPinBack()">← Back</button>
    </div>
  </div>
</div>

<!-- SUMMARY MODAL -->
<div id="summary-modal" class="hidden" onclick="window.closeSummary()">
  <div class="summary-card" onclick="event.stopPropagation()">
    <div class="lb-header">
      <span class="lb-title">👋 Here's your day!</span>
      <button class="lb-close" onclick="window.closeSummary()">×</button>
    </div>
    <div id="summary-body"></div>
    <div class="summary-footer">
      <button class="btn-lg btn-accent" onclick="window.summaryLetsGo()">Let's go</button>
    </div>
  </div>
</div>

<!-- STATS MODAL -->
<div id="stats-modal" class="hidden" onclick="window.closeModal('stats-modal')">
  <div class="stats-card" onclick="event.stopPropagation()">
    <div class="lb-header">
      <span class="lb-title">📊 Stats</span>
      <button class="lb-close" onclick="window.closeModal('stats-modal')">×</button>
    </div>
    <div class="lb-tabs">
      <button class="lb-tab active" id="stats-tab-week" onclick="window.setStatsTab('week',this)">This week</button>
      <button class="lb-tab" id="stats-tab-month" onclick="window.setStatsTab('month',this)">This month</button>
      <button class="lb-tab" id="stats-tab-alltime" onclick="window.setStatsTab('alltime',this)">All time</button>
    </div>
    <div id="stats-chart" class="stats-chart"></div>
    <div class="stats-export">
      <label>From</label>
      <input type="date" id="export-from" />
      <label>to</label>
      <input type="date" id="export-to" />
      <button class="btn-sm btn-accent" onclick="window.exportCSV(document.getElementById('export-from').value,document.getElementById('export-to').value)">Export CSV</button>
    </div>
  </div>
</div>

<!-- LEADERBOARD MODAL -->
<div id="leaderboard-modal" class="hidden" onclick="window.closeModal('leaderboard-modal')">
  <div class="lb-card" onclick="event.stopPropagation()">
    <div class="lb-header">
      <span class="lb-title">🏆 Leaderboard</span>
      <button class="lb-close" onclick="window.closeModal('leaderboard-modal')">×</button>
    </div>
    <div class="lb-tabs">
      <button class="lb-tab active" id="lb-tab-alltime" onclick="window.setLbTab('alltime',this)">All time</button>
      <button class="lb-tab" id="lb-tab-week" onclick="window.setLbTab('week',this)">This week</button>
    </div>
    <div id="lb-list"></div>
  </div>
</div>

<!-- TEMPLATES MODAL -->
<div id="templates-modal" class="hidden" onclick="window.closeModal('templates-modal')">
  <div class="tpl-card" onclick="event.stopPropagation()">
    <div class="lb-header">
      <span class="lb-title">📋 Templates</span>
      <button class="lb-close" onclick="window.closeModal('templates-modal')">×</button>
    </div>
    <div class="tpl-section-label">Save current tasks as template</div>
    <div class="tpl-save-row">
      <input type="text" id="tpl-name-input" placeholder="Template name…" maxlength="60" />
      <button class="btn-sm btn-accent" onclick="window.saveTemplate()">Save</button>
    </div>
    <div class="tpl-section-label">Saved templates</div>
    <div id="tpl-list"></div>
  </div>
</div>

<!-- SET PIN MODAL (admin) -->
<div id="setpin-modal" class="hidden" onclick="window.closeSetPin()">
  <div class="pin-card" onclick="event.stopPropagation()">
    <div class="pin-title" id="setpin-title">Set PIN</div>
    <div class="pin-sub">Enter a new 4-digit PIN</div>
    <div class="pin-dots" id="setpin-dots">
      <div class="pin-dot"></div><div class="pin-dot"></div>
      <div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <div class="pin-pad">
      <button class="pin-key" onclick="window.setPinKey('1')">1</button>
      <button class="pin-key" onclick="window.setPinKey('2')">2</button>
      <button class="pin-key" onclick="window.setPinKey('3')">3</button>
      <button class="pin-key" onclick="window.setPinKey('4')">4</button>
      <button class="pin-key" onclick="window.setPinKey('5')">5</button>
      <button class="pin-key" onclick="window.setPinKey('6')">6</button>
      <button class="pin-key" onclick="window.setPinKey('7')">7</button>
      <button class="pin-key" onclick="window.setPinKey('8')">8</button>
      <button class="pin-key" onclick="window.setPinKey('9')">9</button>
      <button class="pin-key" style="visibility:hidden" disabled></button>
      <button class="pin-key" onclick="window.setPinKey('0')">0</button>
      <button class="pin-key del" onclick="window.setPinDel()">&#9003;</button>
    </div>
    <div class="pin-error" id="setpin-error"></div>
    <button class="btn-sm" style="margin-top:1rem;width:100%" onclick="window.closeSetPin()">Cancel</button>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="logo">Family<span>Flow</span></div>
  <div class="live-dot" title="Live sync"></div>
  <button class="theme-toggle" onclick="window.toggleTheme()" title="Toggle dark mode" id="theme-btn">🌙</button>
  <button class="theme-toggle" onclick="window.openLeaderboard()" title="Leaderboard">🏆</button>
  <button class="theme-toggle" onclick="window.openStats()" title="Stats">📊</button>
  <button class="theme-toggle" onclick="window.openTemplates()" title="Templates">📋</button>
  <button class="theme-toggle" id="btn-select" onclick="window.toggleSelectMode()" title="Select tasks">Select</button>
  <button class="theme-toggle" id="btn-switch-user" onclick="window.switchUser()" title="Switch user">👤</button>
  <div class="header-stats">
    <div class="hstat"><div class="hstat-val" id="h-total">—</div><div class="hstat-label">Total</div></div>
    <div class="hstat"><div class="hstat-val" id="h-done" style="color:var(--accent)">—</div><div class="hstat-label">Done today</div></div>
    <div class="hstat"><div class="hstat-val" id="h-overdue" style="color:var(--warn)">—</div><div class="hstat-label">Overdue</div></div>
    <div class="hstat"><div class="hstat-val" id="h-pct">—</div><div class="hstat-label">Progress</div></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
</header>

<!-- MAIN CONTENT -->
<div class="container">
  <div class="members-bar">
    <span class="members-label">Family members</span>
    <div id="member-chips" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
    <div class="member-add">
      <input type="text" id="new-member" placeholder="Add family member..." maxlength="24" />
      <button class="btn-sm btn-accent" onclick="window.addMember()">+ Add</button>
    </div>
  </div>

  <div class="add-bar">
    <input type="text" id="new-task" placeholder="Add a chore..." maxlength="60" />
    <select id="new-freq" onchange="document.getElementById('new-duedate').style.display=this.value==='once'?'':'none'">
      <option value="daily">Daily</option>
      <option value="weekly" selected>Weekly</option>
      <option value="fortnightly">Fortnightly</option>
      <option value="monthly">Monthly</option>
      <option value="once">One-off</option>
    </select>
    <input type="date" id="new-duedate" style="display:none;height:40px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-size:0.9rem;padding:0 10px;font-family:inherit;" />
    <select id="new-diff">
      <option value="easy" selected>Easy</option>
      <option value="medium">Medium</option>
      <option value="hard">Hard</option>
    </select>
    <select id="new-cat">
      <option value="">No category</option>
      <option>Kitchen</option>
      <option>Bathroom</option>
      <option>Bedroom</option>
      <option>Garden</option>
      <option>Living Room</option>
      <option>Outdoor</option>
      <option>Other</option>
    </select>
    <select id="new-person"></select>
    <button class="btn-lg btn-accent" onclick="window.addTask()">+ Add chore</button>
    <a class="note-toggle" onclick="window.toggleNewNote()">+ note</a>
    <textarea id="new-notes" class="note-input" placeholder="Add a note..." maxlength="300" style="display:none"></textarea>
  </div>

  <div class="filters" id="filters"></div>
  <div id="task-list"></div>
</div>

<!-- BULK ACTION BAR -->
<div id="bulk-bar">
  <span id="bulk-count">0 selected</span>
  <select id="bulk-person"></select>
  <button onclick="window.bulkAssign()">Assign</button>
  <button onclick="window.bulkDelete()">Delete</button>
  <button onclick="window.toggleSelectMode()">Cancel</button>
</div>

<!-- TOASTS -->
<div class="toast" id="toast">Saved</div>
<div class="toast" id="undo-toast" style="right:auto;left:1.5rem;pointer-events:auto;">
  <span id="undo-label">Deleted</span> — <span style="text-decoration:underline;cursor:pointer;color:#fff;" onclick="window.popUndo()">Undo</span>
</div>

</body>
</html>
