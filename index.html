<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Family Chores</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --text: #1A1A18;
    --muted: #7A7870;
    --border: rgba(26,26,24,0.1);
    --accent: #2D6A4F;
    --accent-light: #E8F5EE;
    --warn: #B5460F;
    --warn-light: #FDF0EA;
    --soon: #8B5E00;
    --soon-light: #FEF6E4;
    --done: #3A3A38;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 16px; }

  /* PIN SCREEN */
  #pin-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 999; }
  #pin-screen.hidden { display: none; }
  .pin-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2.5rem 2rem; width: 100%; max-width: 360px; text-align: center; }
  .pin-title { font-family: 'DM Serif Display', serif; font-size: 1.6rem; margin-bottom: 0.4rem; }
  .pin-sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 1.75rem; }
  .pin-dots { display: flex; gap: 12px; justify-content: center; margin-bottom: 1.5rem; }
  .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--bg); transition: all 0.15s; }
  .pin-dot.filled { background: var(--accent); border-color: var(--accent); }
  .pin-dot.error { background: var(--warn); border-color: var(--warn); }
  .pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .pin-key { height: 56px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); font-size: 1.25rem; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background 0.1s; }
  .pin-key:hover { background: var(--surface); }
  .pin-key:active { transform: scale(0.95); }
  .pin-key.del { font-size: 1rem; color: var(--muted); }
  .pin-error { font-size: 0.8rem; color: var(--warn); min-height: 1.4em; margin-top: 0.75rem; }

  /* MEMBER SELECTOR (Phase 9) */
  .pin-member-chip { padding: 8px 20px; border-radius: 20px; border: none; font-size: 0.9rem; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
  .pin-member-chip:hover { opacity: 0.82; }
  .chip-role { cursor: pointer; opacity: 0.5; font-size: 0.85rem; line-height: 1; }
  .chip-role:hover { opacity: 1; }

  /* ROLE-BASED VISIBILITY (Phase 9b) */
  body[data-role="member"] .add-bar,
  body[data-role="member"] .member-add,
  body[data-role="member"] .edit-btn,
  body[data-role="member"] .del { display: none !important; }

  /* READ-ONLY MODE (Phase 9c) */
  body[data-readonly] .chip-del,
  body[data-readonly] .chip-role { display: none !important; }
  #readonly-banner { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: var(--surface); color: var(--muted); font-size: 0.8rem; text-align: center; padding: 6px 1rem; border-bottom: 1px solid var(--border); pointer-events: none; }
  #readonly-banner.hidden { display: none; }

  /* HEADER */
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1.25rem 2rem; display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; }
  .logo { font-family: 'DM Serif Display', serif; font-size: 1.6rem; color: var(--text); flex-shrink: 0; }
  .logo span { color: var(--accent); }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; flex-shrink: 0; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
  .header-stats { display: flex; gap: 1.5rem; margin-left: auto; flex-wrap: wrap; }
  .hstat { text-align: center; }
  .hstat-val { font-size: 1.5rem; font-weight: 500; line-height: 1; }
  .hstat-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }
  .progress-bar { flex-basis: 100%; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }

  /* LAYOUT */
  .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem 2rem; }

  /* MEMBERS BAR */
  .members-bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 1.5rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.875rem 1.25rem; }
  .members-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; flex-shrink: 0; margin-right: 4px; }
  .chip { font-size: 0.8rem; font-weight: 500; padding: 4px 12px; border-radius: 20px; display: flex; align-items: center; gap: 6px; cursor: default; }
  .chip-del { cursor: pointer; opacity: 0.5; font-size: 1rem; line-height: 1; }
  .chip-del:hover { opacity: 1; }
  .member-add { display: flex; gap: 6px; margin-left: auto; }
  .member-add input { height: 32px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); font-size: 0.85rem; padding: 0 10px; width: 130px; font-family: inherit; }
  .member-add input:focus { outline: none; border-color: var(--accent); }
  .btn-sm { height: 32px; padding: 0 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); font-size: 0.8rem; cursor: pointer; font-family: inherit; white-space: nowrap; }
  .btn-sm:hover { background: var(--bg); }
  .btn-accent { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-accent:hover { opacity: 0.88; background: var(--accent); }

  /* ADD BAR */
  .add-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.875rem 1.25rem; margin-bottom: 1.5rem; }
  .add-bar input[type=text] { flex: 1; min-width: 160px; height: 40px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); font-size: 0.95rem; padding: 0 12px; font-family: inherit; }
  .add-bar input:focus { outline: none; border-color: var(--accent); }
  .add-bar select { height: 40px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); font-size: 0.9rem; padding: 0 10px; font-family: inherit; }
  .add-bar select:focus { outline: none; border-color: var(--accent); }
  .btn-lg { height: 40px; padding: 0 20px; border-radius: var(--radius-sm); font-size: 0.9rem; font-family: inherit; cursor: pointer; border: 1px solid; white-space: nowrap; }

  /* FILTERS */
  .filters { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .filter-pill { height: 32px; padding: 0 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); font-size: 0.8rem; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 6px; }
  .filter-pill:hover { border-color: var(--accent); color: var(--accent); }
  .filter-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .filter-pill .count { background: rgba(255,255,255,0.25); border-radius: 10px; padding: 0 6px; font-size: 0.7rem; }
  .filter-pill:not(.active) .count { background: var(--bg); color: var(--muted); }

  /* SECTIONS */
  .section { margin-bottom: 1.5rem; }
  .section-head { font-size: 0.7rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .section-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .dot-available { background: var(--muted); }
  .dot-overdue { background: var(--warn); }
  .dot-soon { background: var(--soon); }
  .dot-ok { background: var(--accent); }
  .dot-done { background: var(--muted); }

  /* TASK CARD */
  .task-card { display: flex; flex-direction: column; gap: 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px; transition: opacity 0.2s, transform 0.15s; cursor: default; }
  .task-card:hover { transform: translateY(-1px); border-color: rgba(26,26,24,0.18); }
  .task-card.done { opacity: 0.4; }
  .task-card.done .task-name { text-decoration: line-through; }
  .task-card.overdue { border-left: 3px solid var(--warn); }
  .task-card.soon { border-left: 3px solid var(--soon); }
  .check { width: 24px; height: 24px; border-radius: 6px; flex-shrink: 0; border: 1.5px solid var(--border); background: var(--bg); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; }
  .check:hover { border-color: var(--accent); }
  .check.checked { background: var(--accent); border-color: var(--accent); }
  .check svg { display: none; }
  .check.checked svg { display: block; }
  .task-name { flex: 1; font-size: 1rem; color: var(--text); }
  .task-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
  .tag { font-size: 0.72rem; font-weight: 500; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
  .tag-freq { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }
  .tag-overdue { background: var(--warn-light); color: var(--warn); }
  .tag-soon { background: var(--soon-light); color: var(--soon); }
  .tag-ok { background: var(--accent-light); color: var(--accent); }
  .del { width: 28px; height: 28px; border: none; background: none; cursor: pointer; color: var(--muted); font-size: 1.1rem; border-radius: 6px; display: flex; align-items: center; justify-content: center; opacity: 0; flex-shrink: 0; }
  .task-card:hover .del { opacity: 0.5; }
  .del:hover { opacity: 1 !important; background: var(--bg); }
  .edit-btn { width: 28px; height: 28px; border: none; background: none; cursor: pointer; color: var(--muted); font-size: 1rem; border-radius: 6px; display: flex; align-items: center; justify-content: center; opacity: 0; flex-shrink: 0; }
  .task-card:hover .edit-btn { opacity: 0.5; }
  .edit-btn:hover { opacity: 1 !important; background: var(--bg); }
  .edit-name { flex: 1; padding: 6px 10px; border: 1.5px solid var(--accent); border-radius: var(--radius-sm); font-size: 0.95rem; font-family: inherit; color: var(--text); background: var(--bg); width: 100%; }
  .edit-row { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
  .edit-row select { flex: 1; padding: 6px 8px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 0.85rem; font-family: inherit; background: var(--bg); color: var(--text); }
  .edit-actions { display: flex; gap: 8px; margin-top: 8px; justify-content: flex-end; }
  .task-card.editing { flex-direction: column; align-items: stretch; cursor: default; }
  .empty { font-size: 0.9rem; color: var(--muted); padding: 1rem 0; }
  .btn-claim { font-size: 0.72rem; font-weight: 500; padding: 3px 10px; border-radius: 20px; white-space: nowrap; background: var(--bg); color: var(--muted); border: 1px solid var(--border); cursor: pointer; font-family: inherit; }
  .btn-claim:hover { border-color: var(--accent); color: var(--accent); }

  /* NOTES */
  .note-toggle { font-size: 0.8rem; color: var(--accent); cursor: pointer; text-decoration: none; white-space: nowrap; }
  .note-toggle:hover { text-decoration: underline; }
  .note-input { flex-basis: 100%; min-height: 48px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); font-size: 0.85rem; padding: 8px 12px; font-family: inherit; resize: vertical; }
  .note-input:focus { outline: none; border-color: var(--accent); }
  .task-note { font-size: 0.8rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
  .edit-notes { width: 100%; min-height: 48px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 0.85rem; font-family: inherit; background: var(--bg); color: var(--text); padding: 6px 8px; resize: vertical; margin-top: 6px; }
  .edit-notes:focus { outline: none; border-color: var(--accent); }

  /* DIFFICULTY TAGS */
  .tag-easy { background: var(--accent-light); color: var(--accent); }
  .tag-medium { background: var(--soon-light); color: var(--soon); }
  .tag-hard { background: var(--warn-light); color: var(--warn); }

  /* SUBTASKS */
  .subtask-badge { font-size: 0.72rem; font-weight: 500; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 2px 8px; margin-left: 6px; white-space: nowrap; }
  .subtask-toggle { width: 24px; height: 24px; border: none; background: none; cursor: pointer; color: var(--muted); font-size: 0.7rem; flex-shrink: 0; display: flex; align-items: center; justify-content: center; border-radius: 4px; transition: transform 0.15s; }
  .subtask-toggle:hover { background: var(--bg); }
  .subtask-toggle.open { transform: rotate(90deg); }
  .subtask-section { width: 100%; }
  .subtask-list { display: none; padding: 8px 0 4px 36px; }
  .subtask-list.open { display: block; }
  .subtask-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 0.85rem; }
  .subtask-check { width: 18px; height: 18px; border-radius: 4px; flex-shrink: 0; border: 1.5px solid var(--border); background: var(--bg); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; }
  .subtask-check:hover { border-color: var(--accent); }
  .subtask-check.checked { background: var(--accent); border-color: var(--accent); }
  .subtask-check svg { display: none; }
  .subtask-check.checked svg { display: block; }
  .subtask-name { flex: 1; }
  .subtask-name.done { text-decoration: line-through; color: var(--muted); }
  .subtask-del { border: none; background: none; cursor: pointer; color: var(--muted); font-size: 0.9rem; opacity: 0.4; padding: 0 4px; }
  .subtask-del:hover { opacity: 1; }
  .subtask-add { display: flex; gap: 6px; padding-top: 4px; }
  .subtask-add input { flex: 1; height: 28px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); font-size: 0.8rem; padding: 0 8px; font-family: inherit; }
  .subtask-add input:focus { outline: none; border-color: var(--accent); }
  .subtask-add button { height: 28px; padding: 0 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); font-size: 0.75rem; cursor: pointer; font-family: inherit; white-space: nowrap; }
  .subtask-add button:hover { background: var(--bg); }

  /* DRAG & DROP */
  .task-card[draggable="true"] { cursor: grab; }
  .task-card.dragging { opacity: 0.4; }
  .task-card.drag-over { border-top: 2px solid var(--accent); }

  /* CARD LAYOUT for subtasks */
  .card-main { display: flex; align-items: center; gap: 12px; width: 100%; }
  .card-info { flex: 1; min-width: 0; }

  /* TOAST */
  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--done); color: #fff; font-size: 0.8rem; padding: 8px 16px; border-radius: var(--radius-sm); opacity: 0; transform: translateY(8px); transition: all 0.25s; pointer-events: none; z-index: 100; }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* DARK MODE */
  [data-theme="dark"] {
    --bg: #1A1A18;
    --surface: #242422;
    --text: #F0EDE6;
    --muted: #8A8880;
    --border: rgba(240,237,230,0.12);
    --accent-light: #1A3D2F;
    --warn-light: #3D1A08;
    --soon-light: #3D2A00;
  }

  /* THEME TOGGLE BUTTON */
  .theme-toggle { width: 36px; height: 36px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; }
  .theme-toggle:hover { background: var(--surface); }

  /* LEADERBOARD MODAL */
  #leaderboard-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; z-index: 998; }
  #leaderboard-modal.hidden { display: none; }
  .lb-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; width: 100%; max-width: 480px; max-height: 80vh; overflow-y: auto; }
  .lb-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .lb-title { font-family: 'DM Serif Display', serif; font-size: 1.4rem; }
  .lb-close { border: none; background: none; font-size: 1.5rem; cursor: pointer; color: var(--muted); padding: 0 4px; line-height: 1; }
  .lb-close:hover { color: var(--text); }
  .lb-tabs { display: flex; gap: 8px; margin-bottom: 1rem; }
  .lb-tab { height: 32px; padding: 0 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg); color: var(--muted); font-size: 0.8rem; cursor: pointer; font-family: inherit; }
  .lb-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .lb-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .lb-row:last-child { border-bottom: none; }
  .lb-rank { font-size: 1rem; font-weight: 500; width: 28px; color: var(--muted); flex-shrink: 0; text-align: center; }
  .lb-name { flex: 1; font-size: 0.85rem; font-weight: 500; padding: 3px 10px; border-radius: 20px; }
  .lb-pts { font-weight: 500; color: var(--accent); white-space: nowrap; font-size: 0.85rem; }
  .lb-streak { white-space: nowrap; font-size: 0.85rem; color: var(--muted); }
  .lb-badges { font-size: 0.9rem; }

  /* SUMMARY MODAL */
  #summary-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; z-index: 998; }
  #summary-modal.hidden { display: none; }
  .summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; width: 100%; max-width: 480px; max-height: 80vh; overflow-y: auto; }
  .summary-footer { margin-top: 1.25rem; text-align: center; }

  /* STATS MODAL */
  #stats-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; z-index: 998; }
  #stats-modal.hidden { display: none; }
  .stats-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; width: 100%; max-width: 520px; max-height: 85vh; overflow-y: auto; }
  .stats-chart { display: flex; flex-direction: column; gap: 10px; margin: 1rem 0; }
  .stats-row { display: flex; align-items: center; gap: 10px; }
  .stats-bar-wrap { flex: 1; background: var(--bg); border-radius: 4px; overflow: hidden; height: 20px; }
  .stats-bar { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.4s ease; min-width: 0; }
  .stats-count { font-size: 0.85rem; font-weight: 500; color: var(--muted); min-width: 28px; text-align: right; }
  .stats-export { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }
  .stats-export label { font-size: 0.8rem; color: var(--muted); }
  .stats-export input[type=date] { height: 32px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); font-size: 0.8rem; padding: 0 8px; font-family: inherit; }
  .stats-export input[type=date]:focus { outline: none; border-color: var(--accent); }

  /* TV */
  @media (min-width: 1400px) {
    body { font-size: 18px; }
    .logo { font-size: 2rem; }
    .task-name { font-size: 1.1rem; }
    .hstat-val { font-size: 1.8rem; }
    header { padding: 1.5rem 3rem; }
    .container { padding: 2rem 3rem; }
  }
  /* Tablet */
  @media (max-width: 700px) {
    header { padding: 1rem 1.25rem; }
    .container { padding: 1rem 1.25rem; }
    .header-stats { gap: 1rem; }
    .task-card { padding: 12px; }
    .check { width: 28px; height: 28px; }
  }
</style>
<script>
  (function(){
    try { if (localStorage.getItem('fc_theme') === 'dark') document.documentElement.setAttribute('data-theme','dark'); } catch(e) {}
  })();
</script>
</head>
<body>

<!-- READ-ONLY BANNER (Phase 9c) -->
<div id="readonly-banner" class="hidden">👁 View only</div>

<!-- PIN SCREEN -->
<div id="pin-screen">
  <div class="pin-card">
    <!-- House PIN section -->
    <div id="pin-house">
      <div class="pin-title">Family<span style="color:var(--accent)">Chores</span></div>
      <div class="pin-sub">Enter your 6-digit family PIN to continue</div>
      <div class="pin-dots" id="pin-dots">
        <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
        <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
      </div>
      <div class="pin-pad">
        <button class="pin-key" onclick="pinKey('1')">1</button>
        <button class="pin-key" onclick="pinKey('2')">2</button>
        <button class="pin-key" onclick="pinKey('3')">3</button>
        <button class="pin-key" onclick="pinKey('4')">4</button>
        <button class="pin-key" onclick="pinKey('5')">5</button>
        <button class="pin-key" onclick="pinKey('6')">6</button>

<!-- PIN LOGIC (plain script, runs first) -->
<script>
(function() {
  const CORRECT_HASH = 'c14c70ff95f6fde8c02bf3a1aa58586756a6867f2f5bbf92f4ba6060b5ede619';
  const SESSION_KEY  = 'fc_auth';
  const LOCKOUT_KEY  = 'fc_lockout';
  const MAX_ATTEMPTS = 5;
  const LOCKOUT_MS   = 5 * 60 * 1000;

  let pinBuffer = '';

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  function isLockedOut() {
    try {
      const d = JSON.parse(sessionStorage.getItem(LOCKOUT_KEY) || 'null');
      if (!d) return false;
      if (Date.now() - d.time < LOCKOUT_MS) return true;
      sessionStorage.removeItem(LOCKOUT_KEY);
    } catch(e) {}
    return false;
  }

  function recordFailure() {
    try {
      const d = JSON.parse(sessionStorage.getItem(LOCKOUT_KEY) || '{"count":0,"time":0}');
      d.count = (d.count || 0) + 1;
      d.time  = Date.now();
      sessionStorage.setItem(LOCKOUT_KEY, JSON.stringify(d));
      return d.count;
    } catch(e) { return 1; }
  }

  function remainingMins() {
    try {
      const d = JSON.parse(sessionStorage.getItem(LOCKOUT_KEY) || 'null');
      if (!d) return 0;
      return Math.ceil((LOCKOUT_MS - (Date.now() - d.time)) / 60000);
    } catch(e) { return 0; }
  }

  function checkSession() {
    try { return sessionStorage.getItem(SESSION_KEY) === 'ok'; } catch(e) { return false; }
  }

  function grantAccess() {
    try { sessionStorage.setItem(SESSION_KEY, 'ok'); } catch(e) {}
    // Don't hide pin-screen yet — show member selector first (Phase 9a)
    if (typeof window._fcOnHousePin === 'function') {
      window._fcOnHousePin();
    } else {
      window._fcHousePinPending = true;
    }
  }

  function updateDots() {
    document.querySelectorAll('.pin-dot').forEach((d, i) => {
      d.classList.toggle('filled', i < pinBuffer.length);
      d.classList.remove('error');
    });
  }

  function flashError(msg) {
    document.querySelectorAll('.pin-dot').forEach(d => { d.classList.remove('filled'); d.classList.add('error'); });
    document.getElementById('pin-error').textContent = msg;
    setTimeout(() => {
      document.querySelectorAll('.pin-dot').forEach(d => d.classList.remove('error'));
      pinBuffer = '';
      updateDots();
    }, 700);
  }

  window.pinKey = async function(digit) {
    if (isLockedOut()) {
      document.getElementById('pin-error').textContent = 'Too many attempts. Try again in ' + remainingMins() + ' min.';
      return;
    }
    if (pinBuffer.length >= 6) return;
    pinBuffer += digit;
    updateDots();

    if (pinBuffer.length === 6) {
      const hash = await sha256(pinBuffer);
      pinBuffer = '';
      if (hash === CORRECT_HASH) {
        grantAccess();
      } else {
        const attempts = recordFailure();
        const left = MAX_ATTEMPTS - attempts;
        if (left <= 0) {
          flashError('Too many attempts. Locked for 5 minutes.');
        } else {
          flashError('Incorrect PIN. ' + left + ' attempt' + (left !== 1 ? 's' : '') + ' left.');
        }
      }
    }
  };

  window.pinDel = function() {
    if (isLockedOut()) return;
    pinBuffer = pinBuffer.slice(0, -1);
    updateDots();
  };

  // On load: skip PIN if session already valid (Phase 9a)
  if (checkSession()) {
    try {
      if (sessionStorage.getItem('fc_member')) {
        // Both house PIN and member already done — skip everything
        document.getElementById('pin-screen').classList.add('hidden');
      } else {
        // House PIN done but no member yet — show member screen (needs Firebase data)
        document.getElementById('pin-house').classList.add('hidden');
        document.getElementById('pin-member').classList.remove('hidden');
        document.getElementById('pin-member-sub').textContent = 'Loading\u2026';
        window._fcHousePinPending = true;
      }
    } catch(e) {
      document.getElementById('pin-screen').classList.add('hidden');
    }
  } else if (isLockedOut()) {
    document.getElementById('pin-error').textContent = 'Too many attempts. Try again in ' + remainingMins() + ' min.';
  }

  // Keyboard support
  document.addEventListener('keydown', function(e) {
    if (document.getElementById('pin-screen').classList.contains('hidden')) return;
    if (e.key >= '0' && e.key <= '9') pinKey(e.key);
    if (e.key === 'Backspace') pinDel();
  });
})();
</script>

<!-- FIREBASE + APP LOGIC -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getDatabase, ref, onValue, set, remove, update } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

const FB_URL = 'https://home-chores-glades-default-rtdb.asia-southeast1.firebasedatabase.app';
const app = initializeApp({ databaseURL: FB_URL }, 'homechores');
const db  = getDatabase(app);

const PCOLS = [
  {bg:'#EAF4FF',text:'#0B3D6B'},{bg:'#E8F5EE',text:'#1A4D35'},
  {bg:'#FEF6E4',text:'#6B4500'},{bg:'#FCE8F3',text:'#6B1A46'},
  {bg:'#EEF0FE',text:'#2D2E8F'},{bg:'#F0FAE8',text:'#2A5210'},
];

const BADGES = [
  { id: 'first',     label: 'First Chore', icon: '⭐', check: m => (m.completedCount || 0) >= 1 },
  { id: 'century',   label: 'Century',     icon: '💯', check: m => (m.completedCount || 0) >= 100 },
  { id: 'on_fire',   label: 'On Fire',     icon: '🔥', check: m => (m.streak || 0) >= 7 },
  { id: 'dedicated', label: 'Dedicated',   icon: '🏅', check: m => (m.streak || 0) >= 30 },
];

function taskPoints(t) {
  const base = { daily: 1, weekly: 3, fortnightly: 5, monthly: 8 }[t.freq] || 1;
  const mult = { easy: 1, medium: 2, hard: 3 }[t.difficulty || 'easy'];
  return base * mult;
}

function getWeekStart() {
  const d = new Date();
  const day = d.getDay();
  d.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  return d.toISOString().slice(0, 10);
}

let state = { members: {}, tasks: {}, history: [], nextId: 1 };
let members = [];   // convenience array of name strings, derived from state.members
let filter = 'all';

// ── Phase 9: Per-member login, roles, read-only ───────────────────────────────
const READONLY = new URLSearchParams(location.search).get('readonly') === '1';
let _pendingMemberName = '';
let _memberPinBuffer   = '';

function currentMember() {
  try { return sessionStorage.getItem('fc_member') || ''; } catch(e) { return ''; }
}

function isAdmin() {
  if (READONLY) return false;
  const m = currentMember();
  return m ? (state.members[m]?.role === 'admin') : false;
}

async function moduleSha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ── Phase 8a: Browser Notifications ──────────────────────────────────────────
let notifiedIds = new Set();
let _overdueCheckStarted = false;

function requestNotificationPermission() {
  if (!('Notification' in window)) { scheduleOverdueCheck(); return; }
  if (Notification.permission === 'default') {
    Notification.requestPermission();
  }
  scheduleOverdueCheck();
}

function scheduleOverdueCheck() {
  if (_overdueCheckStarted) return;
  _overdueCheckStarted = true;
  runOverdueCheck();
  setInterval(runOverdueCheck, 30 * 60 * 1000);
}

function runOverdueCheck() {
  const today = new Date().toISOString().slice(0, 10);
  try {
    if (localStorage.getItem('fc_last_notify_date') !== today) {
      notifiedIds = new Set();
      localStorage.setItem('fc_last_notify_date', today);
    }
  } catch(e) {}
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  Object.values(state.tasks).forEach(t => {
    if (dueStatus(t) === 'overdue' && !t.done && !notifiedIds.has(t.id)) {
      notifiedIds.add(t.id);
      new Notification('FamilyChores', { body: t.name + ' is overdue', icon: '' });
    }
  });
}

// ── Phase 8b: Daily Summary Modal ────────────────────────────────────────────
function maybeShowDailySummary() {
  const today = new Date().toISOString().slice(0, 10);
  try {
    if (localStorage.getItem('fc_summary_date') === today) return;
    localStorage.setItem('fc_summary_date', today);
  } catch(e) { return; }
  renderSummaryModal();
  document.getElementById('summary-modal').classList.remove('hidden');
}

function renderSummaryModal() {
  const currentMember = sessionStorage.getItem('fc_member') || '';
  let tasks = Object.values(state.tasks).filter(t =>
    !t.done && (dueStatus(t) === 'overdue' || dueStatus(t) === 'soon')
  );
  if (currentMember) {
    tasks = tasks.filter(t => t.person === currentMember || t.person === '');
  }
  let body = '';
  if (tasks.length === 0) {
    body = '<div class="empty" style="text-align:center;padding:2rem 0;">You\'re all clear today! \uD83C\uDF89</div>';
  } else {
    body = '<ul style="list-style:none;padding:0;">' +
      tasks.map(t => {
        const s = dueStatus(t);
        const pc = t.person ? pColor(t.person) : null;
        const personBit = t.person && pc
          ? ' <span class="tag" style="background:' + pc.bg + ';color:' + pc.text + ';">' + esc(t.person) + '</span>'
          : '';
        const statusBit = s === 'overdue'
          ? '<span class="tag tag-overdue">Overdue</span>'
          : '<span class="tag tag-soon">Due soon</span>';
        return '<li style="display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border);">' +
          '<span style="flex:1;font-size:0.95rem;">' + esc(t.name) + '</span>' +
          statusBit + personBit +
          '</li>';
      }).join('') +
    '</ul>';
  }
  document.getElementById('summary-body').innerHTML = body;
}

window.closeSummary = function() {
  document.getElementById('summary-modal').classList.add('hidden');
};

window.summaryLetsGo = function() {
  document.getElementById('summary-modal').classList.add('hidden');
  filter = 'pending';
  renderFilters();
  renderTasks();
};

// Grant hook — called by PIN IIFE after access is granted (if module already loaded)
window._fcOnGrant = function() {
  requestNotificationPermission();
  maybeShowDailySummary();
};

function freqDays(f) { return {daily:1,weekly:7,fortnightly:14,monthly:30}[f] || 7; }
function daysSince(ts) { return Math.floor((Date.now() - ts) / 86400000); }
function checkTaskResets() {
  let changed = false;
  const now = Date.now();
  Object.values(state.tasks).forEach(t => {
    if (t.done && now - (t.lastDone || 0) >= freqDays(t.freq) * 86400000) {
      t.done = false;
      changed = true;
    }
  });
  if (changed) writeState();
}
function dueStatus(t) {
  if (t.done) return 'done';
  const d = freqDays(t.freq), s = daysSince(t.lastDone || 0);
  if (s >= d) return 'overdue';
  if (s >= d - 1) return 'soon';
  return 'ok';
}
function pColor(name) {
  const i = members.indexOf(name);
  return i >= 0 ? PCOLS[i % PCOLS.length] : null;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg || 'Saved';
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), 1800);
}

window.toggleTheme = function() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  if (isDark) {
    html.removeAttribute('data-theme');
    document.getElementById('theme-btn').textContent = '🌙';
    try { localStorage.setItem('fc_theme', 'light'); } catch(e) {}
  } else {
    html.setAttribute('data-theme', 'dark');
    document.getElementById('theme-btn').textContent = '☀️';
    try { localStorage.setItem('fc_theme', 'dark'); } catch(e) {}
  }
};

// Sync button icon with current theme on load
(function() {
  if (document.documentElement.getAttribute('data-theme') === 'dark') {
    const btn = document.getElementById('theme-btn');
    if (btn) btn.textContent = '☀️';
  }
})();

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Migrate legacy members array ["Alice","Bob"] → new object format
function migrateLegacyMembers(raw) {
  if (!raw) return {};
  if (Array.isArray(raw)) {
    const obj = {};
    raw.forEach((name, i) => {
      if (name) obj[name] = { name, role: i === 0 ? 'admin' : 'member', pinHash: '', points: 0, streak: 0, lastStreakDate: null, badges: [], completedCount: 0, weekPoints: 0, weekStart: null };
    });
    return obj;
  }
  // Already object format — fill in any missing fields
  const obj = {};
  Object.values(raw).forEach((m, i) => {
    if (!m || !m.name) return;
    obj[m.name] = { points: 0, streak: 0, lastStreakDate: null, badges: [], completedCount: 0, weekPoints: 0, weekStart: null, role: 'member', pinHash: '', ...m };
    if (i === 0 && !m.role) obj[m.name].role = 'admin';
  });
  return obj;
}

// Firebase live listener
let _firstStateLoad = true;
onValue(ref(db, 'state'), snap => {
  const val = snap.val() || {};
  const memberObj = migrateLegacyMembers(val.members);
  state = { members: memberObj, tasks: val.tasks || {}, history: val.history || [], nextId: val.nextId || 1 };
  members = Object.values(state.members).map(m => m.name);
  checkTaskResets();
  render();
  // Run grant hooks once on first load — handles session-restore and deferred-PIN cases (Phase 9)
  if (_firstStateLoad) {
    _firstStateLoad = false;
    // Also define _fcOnHousePin now that members are loaded (covers deferred case)
    window._fcOnHousePin = function() {
      if (members.length === 0) { completeLogin(null); } else { showMemberSelector(); }
    };
    try {
      if (window._fcHousePinPending) {
        // House PIN was validated (or session-restored) before Firebase loaded
        window._fcHousePinPending = false;
        if (members.length === 0) {
          completeLogin(null);
        } else {
          showMemberSelector();
        }
      } else if (sessionStorage.getItem('fc_auth') === 'ok' && sessionStorage.getItem('fc_member')) {
        // Full session restore — both house PIN and member already set
        requestNotificationPermission();
        maybeShowDailySummary();
      }
    } catch(e) {}
  }
}, err => {
  showToast('DB error: ' + err.code);
  console.error('Firebase read error:', err);
});

async function writeState() {
  if (READONLY) return;
  try {
    await set(ref(db, 'state'), {
      members: Object.keys(state.members).length ? state.members : null,
      tasks: Object.keys(state.tasks).length ? state.tasks : null,
      history: state.history.length ? state.history : null,
      nextId: state.nextId
    });
    showToast('Saved');
  } catch (err) {
    showToast('Save failed: ' + err.code);
    console.error('Firebase write error:', err);
  }
}

// ── Phase 9c: Read-only mode init ─────────────────────────────────────────────
if (READONLY) {
  document.getElementById('pin-screen').classList.add('hidden');
  document.body.setAttribute('data-role', 'member');
  document.body.setAttribute('data-readonly', '1');
  document.getElementById('readonly-banner').classList.remove('hidden');
}

// ── Phase 9a: Member login helpers ────────────────────────────────────────────
function completeLogin(name) {
  try { if (name) sessionStorage.setItem('fc_member', name); } catch(e) {}
  document.getElementById('pin-screen').classList.add('hidden');
  requestNotificationPermission();
  maybeShowDailySummary();
  render();
}

function showMemberSelector() {
  document.getElementById('pin-house').classList.add('hidden');
  document.getElementById('pin-member').classList.remove('hidden');
  document.getElementById('pin-member-pin').classList.add('hidden');
  document.getElementById('pin-member-title').textContent = "Who\u2019s using the app?";
  document.getElementById('pin-member-sub').textContent = 'Select your name to continue';
  document.getElementById('pin-member-chips').innerHTML = members.map((m, i) => {
    const c = PCOLS[i % PCOLS.length];
    return '<button class="pin-member-chip" style="background:' + c.bg + ';color:' + c.text + ';"' +
      ' onclick="window.memberSelect(\'' + esc(m) + '\')">' + esc(m) + '</button>';
  }).join('');
}

function showMemberPinPad(name) {
  document.getElementById('pin-member-chips').innerHTML = '';
  document.getElementById('pin-member-title').textContent = name;
  document.getElementById('pin-member-sub').textContent = 'Enter your 4-digit PIN';
  document.getElementById('pin-member-error').textContent = '';
  document.getElementById('pin-member-pin').classList.remove('hidden');
  _memberPinBuffer = '';
  _updateMemberDots();
}

function _updateMemberDots() {
  document.querySelectorAll('#pin-member-dots .pin-dot').forEach((d, i) => {
    d.classList.toggle('filled', i < _memberPinBuffer.length);
    d.classList.remove('error');
  });
}

function _flashMemberError(msg) {
  document.querySelectorAll('#pin-member-dots .pin-dot').forEach(d => {
    d.classList.remove('filled'); d.classList.add('error');
  });
  document.getElementById('pin-member-error').textContent = msg;
  setTimeout(() => {
    document.querySelectorAll('#pin-member-dots .pin-dot').forEach(d => d.classList.remove('error'));
    _memberPinBuffer = '';
    _updateMemberDots();
  }, 700);
}

window.memberSelect = function(name) {
  const mem = state.members[name];
  if (!mem) { completeLogin(null); return; }
  if (mem.pinHash) {
    _pendingMemberName = name;
    showMemberPinPad(name);
  } else {
    completeLogin(name);
  }
};

window.memberPinKey = async function(digit) {
  if (_memberPinBuffer.length >= 4) return;
  _memberPinBuffer += digit;
  _updateMemberDots();
  if (_memberPinBuffer.length === 4) {
    const hash = await moduleSha256(_memberPinBuffer);
    const expected = (state.members[_pendingMemberName] || {}).pinHash || '';
    _memberPinBuffer = '';
    if (hash === expected) {
      completeLogin(_pendingMemberName);
    } else {
      _flashMemberError('Incorrect PIN');
    }
  }
};

window.memberPinDel = function() {
  _memberPinBuffer = _memberPinBuffer.slice(0, -1);
  _updateMemberDots();
};

window.memberPinBack = function() {
  _pendingMemberName = '';
  _memberPinBuffer = '';
  showMemberSelector();
};

window.toggleTask = async function(id) {
  if (READONLY) return;
  const t = state.tasks[id];
  if (!t) return;
  if (!isAdmin() && t.person !== currentMember()) {
    showToast('Only your own tasks can be checked');
    return;
  }
  const done = !t.done;
  try {
    await update(ref(db, 'state/tasks/' + id), { done, lastDone: done ? Date.now() : t.lastDone });
  } catch (err) {
    showToast('Update failed: ' + err.code);
    console.error('Firebase toggle error:', err);
    return;
  }
  if (done && t.person) {
    const person = t.person;
    const m = state.members[person];
    if (!m) return;
    const pts = taskPoints(t);
    const today = new Date().toISOString().slice(0, 10);
    const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
    const weekStart = getWeekStart();
    const newPoints = (m.points || 0) + pts;
    const newCompletedCount = (m.completedCount || 0) + 1;
    const newStreak = m.lastStreakDate === today ? (m.streak || 0) :
                      m.lastStreakDate === yesterday ? (m.streak || 0) + 1 : 1;
    const newWeekPoints = (m.weekStart === weekStart ? (m.weekPoints || 0) : 0) + pts;
    const currentBadges = m.badges || [];
    const virtualMember = { ...m, points: newPoints, completedCount: newCompletedCount, streak: newStreak };
    const newBadgeIds = BADGES
      .filter(b => !currentBadges.includes(b.id) && b.check(virtualMember))
      .map(b => b.id);
    const memberUpdate = {
      points: newPoints,
      completedCount: newCompletedCount,
      streak: newStreak,
      lastStreakDate: today,
      weekPoints: newWeekPoints,
      weekStart: weekStart,
    };
    if (newBadgeIds.length) memberUpdate.badges = [...currentBadges, ...newBadgeIds];
    try {
      await update(ref(db, 'state/members/' + person), memberUpdate);
      newBadgeIds.forEach(bid => {
        const b = BADGES.find(b => b.id === bid);
        if (b) showToast(b.icon + ' Badge earned: ' + b.label + '!');
      });
    } catch (err) {
      showToast('Member update failed: ' + err.code);
      console.error('Firebase member update error:', err);
    }
    const histEntry = { taskId: id, taskName: t.name, person: t.person, completedAt: Date.now(), points: taskPoints(t) };
    const newHistory = (state.history || []).concat([histEntry]).slice(-500);
    try {
      await update(ref(db, 'state'), { history: newHistory });
    } catch (err) {
      showToast('History update failed: ' + err.code);
      console.error('Firebase history update error:', err);
    }
  }
};

function renderFilters() {
  const tasks = Object.values(state.tasks);
  const counts = {
    all:     tasks.length,
    pending: tasks.filter(t => !t.done).length,
    overdue: tasks.filter(t => dueStatus(t) === 'overdue').length,
    done:    tasks.filter(t => t.done).length,
  };
  const defs = [{k:'all',label:'All'},{k:'pending',label:'Pending'},{k:'overdue',label:'Overdue'},{k:'done',label:'Done today'}];
  document.getElementById('filters').innerHTML = defs.map(d =>
    '<button class="filter-pill' + (filter === d.k ? ' active' : '') + '" onclick="setFilter(\'' + d.k + '\',this)">' +
    d.label + '<span class="count">' + counts[d.k] + '</span></button>'
  ).join('');
}

function renderTasks() {
  let tasks = Object.values(state.tasks);
  if (filter === 'pending') tasks = tasks.filter(t => !t.done);
  else if (filter === 'overdue') tasks = tasks.filter(t => dueStatus(t) === 'overdue');
  else if (filter === 'done') tasks = tasks.filter(t => t.done);

  const available = tasks.filter(t => !t.done && !t.person);
  const rest = tasks.filter(t => t.done || t.person);

  const statusOrder = {overdue:0, soon:1, ok:2, done:3};
  rest.sort((a, b) => {
    const sd = (statusOrder[dueStatus(a)] || 2) - (statusOrder[dueStatus(b)] || 2);
    if (sd !== 0) return sd;
    return (a.order || 0) - (b.order || 0);
  });

  const sections = {available, overdue:[], soon:[], ok:[], done:[]};
  rest.forEach(t => sections[dueStatus(t)].push(t));

  const defs = [
    {k:'available', label:'Available',  dot:'dot-available'},
    {k:'overdue', label:'Overdue',   dot:'dot-overdue'},
    {k:'soon',    label:'Due soon',  dot:'dot-soon'},
    {k:'ok',      label:'Upcoming',  dot:'dot-ok'},
    {k:'done',    label:'Done today',dot:'dot-done'},
  ];

  let html = '';
  for (const d of defs) {
    if (!sections[d.k].length) continue;
    html += '<div class="section"><div class="section-head"><span class="section-dot ' + d.dot + '"></span>' + d.label + '</div>';
    sections[d.k].forEach(t => { html += cardHTML(t); });
    html += '</div>';
  }
  if (!html) html = '<div class="empty">Nothing here — all clear!</div>';
  document.getElementById('task-list').innerHTML = html;
}

function cardHTML(t) {
  const s  = dueStatus(t);
  const pc = t.person ? pColor(t.person) : null;
  const personTag = t.person
    ? (pc ? '<span class="tag" style="background:' + pc.bg + ';color:' + pc.text + ';">' + esc(t.person) + '</span>' : '')
    : '<button class="btn-claim" onclick="claimTask(\'' + t.id + '\')">Claim</button>';
  const dueTag = s === 'overdue' ? '<span class="tag tag-overdue">Overdue</span>'
               : s === 'soon'    ? '<span class="tag tag-soon">Due soon</span>'
               : s === 'ok'      ? '<span class="tag tag-ok">On track</span>' : '';
  const diff = t.difficulty || 'easy';
  const diffTag = '<span class="tag tag-' + diff + '">' + diff + '</span>';

  // Notes line
  const notesLine = t.notes
    ? '<div class="task-note">' + esc(t.notes.length > 80 ? t.notes.slice(0, 80) + '…' : t.notes) + '</div>'
    : '';

  // Subtasks
  const subs = t.subtasks ? Object.values(t.subtasks) : [];
  const subsDone = subs.filter(st => st.done).length;
  const subsBadge = subs.length
    ? '<span class="subtask-badge">' + subsDone + '/' + subs.length + '</span>'
    : '';
  const hasSubtasks = subs.length > 0;
  const chevronBtn = '<button class="subtask-toggle" onclick="toggleSubtasks(\'' + t.id + '\')" title="Subtasks">&#9654;</button>';

  let subtaskSection = '';
  if (true) { // always render subtask area for add-subtask input
    let subRows = '';
    subs.forEach(st => {
      subRows +=
        '<div class="subtask-row">' +
          '<div class="subtask-check' + (st.done ? ' checked' : '') + '" onclick="toggleSubtask(\'' + t.id + '\',\'' + st.id + '\')">' +
            '<svg width="10" height="10" viewBox="0 0 12 12" fill="none"><polyline points="2,6 5,9 10,3" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
          '</div>' +
          '<span class="subtask-name' + (st.done ? ' done' : '') + '">' + esc(st.name) + '</span>' +
          '<button class="subtask-del" onclick="removeSubtask(\'' + t.id + '\',\'' + st.id + '\')" title="Remove">×</button>' +
        '</div>';
    });
    subtaskSection =
      '<div class="subtask-list">' +
        subRows +
        '<div class="subtask-add">' +
          '<input type="text" placeholder="Add subtask..." maxlength="60" onkeydown="if(event.key===\'Enter\')addSubtask(\'' + t.id + '\')" />' +
          '<button onclick="addSubtask(\'' + t.id + '\')">+ Add</button>' +
        '</div>' +
      '</div>';
  }

  return '<div class="task-card ' + s + '" id="tc-' + t.id + '" draggable="true" data-id="' + t.id + '">' +
    '<div class="card-main">' +
      '<div class="check' + (t.done ? ' checked' : '') + '" onclick="toggleTask(\'' + t.id + '\')">' +
        '<svg width="12" height="12" viewBox="0 0 12 12" fill="none">' +
          '<polyline points="2,6 5,9 10,3" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>' +
        '</svg>' +
      '</div>' +
      '<div class="card-info">' +
        '<span class="task-name">' + esc(t.name) + subsBadge + '</span>' +
        notesLine +
      '</div>' +
      '<div class="task-meta">' + dueTag + diffTag + '<span class="tag tag-freq">' + t.freq + '</span>' + personTag + '</div>' +
      chevronBtn +
      '<button class="edit-btn" onclick="editTask(\'' + t.id + '\')" title="Edit">✎</button>' +
      '<button class="del" onclick="deleteTask(\'' + t.id + '\')" title="Remove">×</button>' +
    '</div>' +
    '<div class="subtask-section">' + subtaskSection + '</div>' +
  '</div>';
}

function getStatsFromTs() {
  if (statsTab === 'week') {
    const d = new Date();
    const day = d.getDay();
    d.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
    d.setHours(0, 0, 0, 0);
    return d.getTime();
  } else if (statsTab === 'month') {
    const d = new Date();
    d.setDate(1);
    d.setHours(0, 0, 0, 0);
    return d.getTime();
  }
  return 0;
}

function renderStats() {
  const from = getStatsFromTs();
  const history = (state.history || []).filter(e => e.completedAt >= from);
  const counts = {};
  history.forEach(e => { if (e.person) counts[e.person] = (counts[e.person] || 0) + 1; });
  const max = Math.max(1, ...Object.values(counts).concat([0]));
  const el = document.getElementById('stats-chart');
  if (!members.length) { el.innerHTML = '<div class="empty">No members yet.</div>'; return; }
  el.innerHTML = members.map((m, i) => {
    const c = PCOLS[i % PCOLS.length];
    const count = counts[m] || 0;
    const pct = Math.round(count / max * 100);
    return '<div class="stats-row">' +
      '<span class="lb-name" style="background:' + c.bg + ';color:' + c.text + ';min-width:80px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0;">' + esc(m) + '</span>' +
      '<div class="stats-bar-wrap"><div class="stats-bar" style="width:' + pct + '%"></div></div>' +
      '<span class="stats-count">' + count + '</span>' +
    '</div>';
  }).join('');
}

window.exportCSV = function(from, to) {
  const fromTs = from ? new Date(from).getTime() : 0;
  const toTs   = to   ? new Date(to).getTime() + 86399999 : Date.now();
  const rows = (state.history || []).filter(e => e.completedAt >= fromTs && e.completedAt <= toTs);
  function csvField(s) {
    s = String(s);
    return s.includes(',') || s.includes('"') ? '"' + s.replace(/"/g, '""') + '"' : s;
  }
  let csv = 'date,person,task,frequency,difficulty,points\n';
  rows.forEach(e => {
    const task = state.tasks[e.taskId];
    const freq = task ? (task.freq || '') : '';
    const diff = task ? (task.difficulty || 'easy') : '';
    csv += [
      csvField(new Date(e.completedAt).toLocaleDateString()),
      csvField(e.person || ''),
      csvField(e.taskName || ''),
      csvField(freq),
      csvField(diff),
      csvField(e.points || 0),
    ].join(',') + '\n';
  });
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'chores-export.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
};

// Drag-and-drop reorder
let draggedId = null;
const taskList = document.getElementById('task-list');

taskList.addEventListener('dragstart', function(e) {
  const card = e.target.closest('.task-card');
  if (!card) return;
  draggedId = card.dataset.id;
  card.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
});

taskList.addEventListener('dragend', function(e) {
  const card = e.target.closest('.task-card');
  if (card) card.classList.remove('dragging');
  draggedId = null;
  taskList.querySelectorAll('.drag-over').forEach(c => c.classList.remove('drag-over'));
});

taskList.addEventListener('dragover', function(e) {
  e.preventDefault();
  const card = e.target.closest('.task-card');
  if (!card || card.dataset.id === draggedId) return;
  taskList.querySelectorAll('.drag-over').forEach(c => c.classList.remove('drag-over'));
  card.classList.add('drag-over');
});

taskList.addEventListener('dragleave', function(e) {
  const card = e.target.closest('.task-card');
  if (card) card.classList.remove('drag-over');
});

taskList.addEventListener('drop', async function(e) {
  e.preventDefault();
  taskList.querySelectorAll('.drag-over').forEach(c => c.classList.remove('drag-over'));
  const card = e.target.closest('.task-card');
  if (!card || !draggedId) return;
  const targetId = card.dataset.id;
  if (targetId === draggedId) return;
  const a = state.tasks[draggedId], b = state.tasks[targetId];
  if (!a || !b) return;
  const tmpOrder = a.order || 0;
  a.order = b.order || 0;
  b.order = tmpOrder;
  draggedId = null;
  await writeState();
});
</script>
